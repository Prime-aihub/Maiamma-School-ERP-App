
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIAMMA School Hub Login</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <h1>MAIAMMA School Hub</h1>

        <p>
            One Platform. Complete School Ecosystem.
        </p>

        <ul>
            <li>School ERP</li>
            <li>Parent Engagement</li>
            <li>AI Learning</li>
            <li>School Commerce</li>
            <li>Transport Management</li>
            <li>White Label Apps</li>
        </ul>

    </div>

    <!-- LOGIN CARD -->

    <div class="login-card">

        <h2>Welcome Back</h2>

        <!-- ROLE SELECT -->

        <div class="input-group">

            <label>Select Role</label>

            <select id="userRole">

                <option value="parent">
                    Parent
                </option>

                <option value="student">
                    Student
                </option>

                <option value="teacher">
                    Teacher
                </option>

                <option value="admin">
                    School Admin
                </option>

            </select>

        </div>

        <!-- LOGIN FORM -->

        <form id="loginForm">

           
<div class="input-group">

    <input
    type="text"
    id="email"
    placeholder="Parent Email or Mobile"
    required
>

</div>

<div
    class="input-group"
    id="schoolIdGroup"
    style="display:none;"
>

    <input
        type="text"
        id="schoolId"
        placeholder="School ID"
    >

</div>



            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <span id="togglePassword">
                    👁
                </span>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button
                type="button"
                id="loginBtn"
                class="login-btn">

                Login

            </button>

        </form>

        <a href="index.html" class="back-home">
            ← Back to Home
        </a>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
